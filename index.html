<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Virtual Twins — Cards & Operator UI</title>
<link rel="icon" type="image/png" href="assets/vt-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html,body { margin:0; padding:0; background:#08090C; color:#E8E8EE;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { width:100vw; height:100vh; overflow:hidden; }

  /* Scrollbar styling for dark panels */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  button { font-family: inherit; }

  /* Gradient text utility */
  .vt-grad-text {
    background: linear-gradient(135deg, #B57CF8 0%, #9B5CF6 40%, #E8B860 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .vt-gold-text {
    background: linear-gradient(180deg, #F2C97A 0%, #E8B860 50%, #B8822E 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .vt-purple-text {
    background: linear-gradient(180deg, #B57CF8 0%, #9B5CF6 50%, #6B3FD4 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* animated gradient glow used in hero pieces */
  @keyframes vt-pulse { 0%,100% { opacity: .55 } 50% { opacity: .9 } }
  @keyframes vt-spin { to { transform: rotate(360deg) } }
  @keyframes vt-blink { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
  @keyframes vt-sweep { 0% { transform: translateX(-100%) } 100% { transform: translateX(200%) } }
  @keyframes vt-shimmer { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="api.jsx?v=20260422-auth-ui"></script>
  <script type="text/babel" src="ui-kit.jsx"></script>

</body>
